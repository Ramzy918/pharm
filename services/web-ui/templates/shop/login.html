{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="panel narrow">
  <h1>Connexion professionnelle</h1>
  <form method="post" class="stack">
    {% csrf_token %}
    <label>E-mail
      <input type="email" name="email" required autocomplete="username" placeholder="pro@demo.local">
    </label>
    <label>Mot de passe
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit" class="btn-primary full">Entrer</button>
  </form>
  <p class="muted">Admin démo : <code>admin@demo.local</code> / <code>adminadmin123</code></p>
  <p style="font-size:0.9rem; margin-top:0.8rem;">Pas encore de compte ? <a href="{% url 'signup' %}">Créer un compte</a></p>
</div>
{% endblock %}
